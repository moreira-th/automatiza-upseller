<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Revisão do Anúncio - Listing Copier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 {
      font-size: 20px;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 .badge {
      font-size: 11px;
      background: #2ecc71;
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #2ecc71; color: #fff; }
    .btn-primary:hover { background: #27ae60; }
    .btn-secondary { background: #3498db; color: #fff; }
    .btn-secondary:hover { background: #2980b9; }
    .btn-outline { background: #e8ecf1; color: #333; }
    .btn-outline:hover { background: #d5dbe3; }
    .btn-copied { background: #8e44ad !important; color: #fff !important; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fafbfc;
    }
    .card-body { padding: 16px 20px; }

    .info-row {
      display: flex;
      margin-bottom: 10px;
      font-size: 13px;
      line-height: 1.5;
    }
    .info-row:last-child { margin-bottom: 0; }
    .info-label {
      font-weight: 600;
      color: #666;
      min-width: 100px;
      flex-shrink: 0;
    }
    .info-value { color: #333; word-break: break-word; }
    .info-value.id { font-family: 'SF Mono', 'Consolas', monospace; background: #f5f5f5; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

    .color-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .color-table th {
      text-align: left;
      padding: 10px 12px;
      background: #f8f9fa;
      border-bottom: 2px solid #e0e0e0;
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
    }
    .color-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }
    .color-table tr:last-child td { border-bottom: none; }
    .color-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .color-swatch img {
      width: 24px; height: 24px; border-radius: 4px;
      object-fit: cover; border: 1px solid #ddd;
      flex-shrink: 0;
    }
    .color-swatch .dot {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid #ddd; flex-shrink: 0;
    }
    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .link-list li {
      font-size: 12px;
      word-break: break-all;
    }
    .link-list li a {
      color: #3498db;
      text-decoration: none;
    }
    .link-list li a:hover { text-decoration: underline; }
    .link-count {
      font-size: 11px;
      color: #999;
      margin-left: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #666; }
    .empty-state p { font-size: 13px; }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .toast.show { opacity: 1; }

    .site-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .site-tag.temu { background: #fff0e6; color: #e67e22; }
    .site-tag.shein { background: #e8f4fd; color: #2980b9; }

    .unavailable { color: #e74c3c; font-size: 12px; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        Listing Copier
        <span id="siteTag" class="badge"></span>
      </h1>
      <div class="actions">
        <button class="btn btn-primary" id="btnCopiar" disabled>📋 Copiar para planilha</button>
      </div>
    </div>

    <div id="mainContent">
      <div class="empty-state">
        <div class="icon">📦</div>
        <h2>Nenhum anúncio carregado</h2>
        <p>Navegue até um produto na Shein ou Temu<br>e clique no botão verde flutuante (ou Ctrl+Shift+C).</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="review.js"></script>
</body>
</html>
