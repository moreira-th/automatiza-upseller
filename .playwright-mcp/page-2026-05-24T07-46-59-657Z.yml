            - generic [ref=e97]:
              - textbox [ref=e98]: "Moletom Canguru Unissex com Capuz – Conforto e Estilo para o Dia a Dia O moletom canguru com capuz é uma peça versátil, ideal para quem busca conforto, praticidade e estilo em diferentes momentos do dia. Pode ser utilizado em atividades casuais, trabalho, academia ou nos dias mais frios, oferecendo aquecimento e ótimo caimento para o uso diário. Descrição do Produto Produzido em tecido de qualidade com 70% algodão e 30% poliéster, o moletom oferece toque macio, conforto térmico e boa resistência ao uso contínuo. O modelo possui capuz funcional e bolso canguru frontal, trazendo praticidade para o dia a dia e um visual moderno. Seu design unissex garante conforto e liberdade de movimento, além de combinar facilmente com diferentes estilos e looks. Características do Produto Modelo: Moletom canguru unissex com capuz Composição do tecido: 70% algodão / 30% poliéster Bolso canguru frontal funcional Tecido confortável e resistente Ideal para dias frios, uso diário, trabalho ou academia Estilo casual e fácil de combinar Tabela de Tamanhos P Largura: 52 cm Altura: 65 a 70 cm M Largura: 54 cm Altura: 71 a 75 cm G Largura: 58 cm Altura: 76 cm GG Largura: 62 cm Altura: 77 a 82 cm As medidas podem apresentar pequenas variações. Recomendamos verificar a tabela antes da compra para escolher o tamanho mais adequado. Peça confortável, resistente e com excelente custo-benefício, ideal para quem procura praticidade, estilo e qualidade no dia a dia."
