<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Tab Tiler</title></head>
<body style="width:200px;text-align:center;font-family:sans-serif;padding:16px">
  <h3>Tab Tiler</h3>
  <input id="urlFilter" type="text" placeholder="Filtrar por URL (ex: shein)" style="width:100%;padding:6px;margin-bottom:8px;box-sizing:border-box;font-size:12px">
  <button id="tileBtn" style="padding:8px 16px;font-size:14px;cursor:pointer;width:100%;margin-bottom:8px">
    Tile All Tabs
  </button>
  <button id="gatherBtn" style="padding:8px 16px;font-size:14px;cursor:pointer;width:100%">
    Gather All Tabs
  </button>
  <p id="status" style="font-size:12px;color:#666;margin-top:8px"></p>
  <script src="popup.js"></script>
</body>
</html>
